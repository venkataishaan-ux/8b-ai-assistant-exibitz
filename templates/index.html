<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 8B AI Assistant</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1e2f, #111119);
            --chat-bg: #252538;
            --user-bubble: #6c5ce7;
            --bot-bubble: #3b3b54;
            --text-color: #f5f5fa;
            --accent-color: #a29bfe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #33334d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 { font-size: 1.4rem; color: var(--accent-color); }

        .clear-btn {
            background-color: #ff7675;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .clear-btn:hover { background-color: #d63031; }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            background-color: var(--user-bubble);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: var(--bot-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #444466;
        }

        /* Preview area for image selection */
        #preview-container {
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            display: none;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #33334d;
        }
        #preview-img {
            max-height: 60px;
            border-radius: 6px;
            border: 1px solid var(--accent-color);
        }
        .cancel-img-btn {
            background: #ff7675;
            border: none;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
        }

        footer {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #33334d;
        }

        /* File button design */
        .file-label {
            background-color: #3b3b54;
            color: var(--accent-color);
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-label:hover { background-color: #4a4a6a; }
        #image-input { display: none; }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #444466;
            background-color: #1a1a26;
            color: #fff;
            outline: none;
            font-size: 1rem;
        }
        input[type="text"]:focus { border-color: var(--accent-color); }

        .send-btn {
            background-color: var(--user-bubble);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-btn:hover { background-color: #5b4cc4; }
    </style>
</head>
<body>

    <header>
        <h1>🏫 Class 8B Multi-Modal Assistant</h1>
        <button class="clear-btn" onclick="clearHistory()">Clear Chat</button>
    </header>

    <div id="chat-container"></div>

    <div id="preview-container">
        <img id="preview-img" src="" alt="Preview">
        <button class="cancel-img-btn" onclick="removeImage()">✕</button>
        <span style="font-size: 0.85rem; color: #aaa;">Image attached ready to send</span>
    </div>

    <footer>
        <label for="image-input" class="file-label">📎</label>
        <input type="file" id="image-input" accept="image/*" onchange="previewFile()">
        
        <input type="text" id="user-input" placeholder="Ask a question or upload a diagram..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const imageInput = document.getElementById('image-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        let currentBase64Image = null;

        // Load conversation logs when page loads
        window.onload = async () => {
            const res = await fetch('/get_history');
            const history = await res.json();
            history.forEach(msg => appendMessage(msg.sender === 'user' ? 'user' : 'bot', msg.text));
        };

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Handle image selection preview
        function previewFile() {
            const file = imageInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onloadend = function () {
                currentBase64Image = reader.result.split(',')[1]; // Get only the base64 string bytes
                previewImg.src = reader.result;
                previewContainer.style.display = 'flex';
            }
            reader.readAsDataURL(file);
        }

        function removeImage() {
            imageInput.value = "";
            currentBase64Image = null;
            previewContainer.style.display = 'none';
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            const img = currentBase64Image;

            if (!text && !img) return;

            // If text exists, display it; if image layout exists without text, display fallback indicator
            if (text) {
                appendMessage('user', text);
            } else if (img) {
                appendMessage('user', "[Sent a picture]");
            }

            userInput.value = '';
            removeImage(); // Hide preview layout immediately after sending

            // Append a dynamic loading block
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.innerText = 'Analyzing...';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, image: img })
                });
                const data = await response.json();
                
                chatContainer.removeChild(loadingDiv); // Remove placeholder
                
                if (data.response) {
                    appendMessage('bot', data.response);
                } else {
                    appendMessage('bot', "Error: " + (data.error || "Unknown response glitch"));
                }
            } catch (err) {
                chatContainer.removeChild(loadingDiv);
                appendMessage('bot', "Could not reach server.");
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function clearHistory() {
            if (confirm("Clear your conversation history?")) {
                await fetch('/clear_history', { method: 'POST' });
                chatContainer.innerHTML = '';
            }
        }
    </script>
</body>
</html>
