<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 8B AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1e2f, #111119);
            --chat-bg: #252538;
            --user-bubble: #6c5ce7;
            --bot-bubble: #3b3b54;
            --text-color: #f5f5fa;
            --accent-color: #a29bfe;
            --sidebar-bg: #1a1a26;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Split Screen Container Setup */
        .app-layout {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #33334d;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
        }

        .new-chat-btn {
            background-color: var(--user-bubble);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
            text-align: center;
        }
        .new-chat-btn:hover { background-color: #5b4cc4; }

        .session-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .session-item {
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid #33334d;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .session-item:hover, .session-item.active {
            background-color: var(--bot-bubble);
            border-color: var(--accent-color);
        }

        .delete-session-btn {
            background: transparent;
            border: none;
            color: #ff7675;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0 4px;
        }
        .delete-session-btn:hover { color: #d63031; }

        /* Main View Chat Interface Panels */
        .main-chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: transparent;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #33334d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 { font-size: 1.4rem; color: var(--accent-color); }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }
        .message p { margin-bottom: 6px; }
        .message p:last-child { margin-bottom: 0; }
        .message ul, .message ol { margin-left: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            background-color: var(--user-bubble);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: var(--bot-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #444466;
        }

        #preview-container {
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            display: none;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #33334d;
        }
        #preview-img {
            max-height: 60px;
            border-radius: 6px;
            border: 1px solid var(--accent-color);
        }
        .cancel-img-btn {
            background: #ff7675;
            border: none;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
        }

        footer {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #33334d;
        }

        .file-label {
            background-color: #3b3b54;
            color: var(--accent-color);
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-label:hover { background-color: #4a4a6a; }
        #image-input { display: none; }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #444466;
            background-color: #1a1a26;
            color: #fff;
            outline: none;
            font-size: 1rem;
        }
        input[type="text"]:focus { border-color: var(--accent-color); }

        .send-btn {
            background-color: var(--user-bubble);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-btn:hover { background-color: #5b4cc4; }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
            <div class="session-list" id="sessionList"></div>
        </div>

        <div class="main-chat-view">
            <header>
                <h1>🏫 Class 8B Multi-Modal Assistant</h1>
            </header>

            <div id="chat-container"></div>

            <div id="preview-container">
                <img id="preview-img" src="" alt="Preview">
                <button class="cancel-img-btn" onclick="removeImage()">✕</button>
                <span style="font-size: 0.85rem; color: #aaa;">Image attached ready to send</span>
            </div>

            <footer>
                <label for="image-input" class="file-label">📎</label>
                <input type="file" id="image-input" accept="image/*" onchange="previewFile()">
                
                <input type="text" id="user-input" placeholder="Ask a question or upload a diagram..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </footer>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const imageInput = document.getElementById('image-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const sessionList = document.getElementById('sessionList');
        
        let currentSessionId = '';
        let currentBase64Image = null;

        // Initialize lists on document ready
        window.onload = async () => {
            await loadSessions();
        };

        async function loadSessions() {
            try {
                const res = await fetch('/get_sessions');
                const sessions = await res.json();
                sessionList.innerHTML = '';
                
                if (sessions.length === 0) {
                    await createNewChat();
                    return;
                }

                sessions.forEach((session, index) => {
                    const div = document.createElement('div');
                    div.className = 'session-item';
                    div.id = `session-${session.id}`;
                    if(session.id === currentSessionId) div.classList.add('active');
                    
                    div.innerHTML = `
                        <span onclick="switchSession('${session.id}')" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${session.title}</span>
                        <button class="delete-session-btn" onclick="deleteSession(event, '${session.id}')">✕</button>
                    `;
                    sessionList.appendChild(div);

                    if (index === 0 && !currentSessionId) {
                        switchSession(session.id);
                    }
                });
            } catch (e) {
                console.error("Error loading chat sessions:", e);
            }
        }

        async function createNewChat() {
            try {
                const res = await fetch('/create_session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: 'New Chat Room' })
                });
                const data = await res.json();
                currentSessionId = data.session_id;
                await loadSessions();
                switchSession(data.session_id);
            } catch (e) {
                console.error("Failed creating a new chat room:", e);
            }
        }

        async function switchSession(sessionId) {
            currentSessionId = sessionId;
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.getElementById(`session-${sessionId}`);
            if (activeItem) activeItem.classList.add('active');

            chatContainer.innerHTML = '';

            try {
                const res = await fetch(`/get_history/${sessionId}`);
                const history = await res.json();
                history.forEach(msg => {
                    appendMessage(msg.sender === 'user' ? 'user' : 'bot', msg.text);
                });
            } catch (e) {
                console.error("Failed loading room log logs:", e);
            }
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            
            if (sender === 'bot') {
                // Renders neat markdown structures out of raw strings
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.innerText = text;
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function previewFile() {
            const file = imageInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onloadend = function () {
                currentBase64Image = reader.result.split(',')[1];
                previewImg.src = reader.result;
                previewContainer.style.display = 'flex';
            }
            reader.readAsDataURL(file);
        }

        function removeImage() {
            imageInput.value = "";
            currentBase64Image = null;
            previewContainer.style.display = 'none';
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            const img = currentBase64Image;

            if (!text && !img) return;
            if (!currentSessionId) return;

            appendMessage('user', text ? text : "[Sent a picture]");

            userInput.value = '';
            removeImage();

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.innerText = 'Analyzing room data...';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const res = await fetch(`/chat/${currentSessionId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, image: img })
                });
                const data = await res.json();
                
                chatContainer.removeChild(loadingDiv);
                
                if (data.response) {
                    appendMessage('bot', data.response);
                    await loadSessions(); // Updates room name on sidebar if first prompt
                } else {
                    appendMessage('bot', "Error: " + (data.error || "glitch"));
                }
            } catch (err) {
                if(loadingDiv.parentNode) chatContainer.removeChild(loadingDiv);
                appendMessage('bot', "Could not reach server system backend.");
            }
        }

        async function deleteSession(event, sessionId) {
            event.stopPropagation();
            if (confirm("Delete this conversation room permanently?")) {
                await fetch(`/clear_session/${sessionId}`, { method: 'POST' });
                if (currentSessionId === sessionId) {
                    currentSessionId = '';
                }
                await loadSessions();
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
