<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8B AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%); 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: ''; position: absolute; width: 300px; height: 300px;
            background: #3b82f6; filter: blur(120px); top: 10%; left: 15%; opacity: 0.3; z-index: 0;
        }
        body::after {
            content: ''; position: absolute; width: 300px; height: 300px;
            background: #a855f7; filter: blur(120px); bottom: 10%; right: 15%; opacity: 0.2; z-index: 0;
        }

        .chat-container { 
            width: 600px; max-width: 95%; background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px);
            padding: 25px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; height: 85vh; border: 1px solid rgba(255,255,255,0.1);
            position: relative; z-index: 1;
        }

        /* Class 8B Brand Header */
        .header-area {
            display: flex; flex-direction: column; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 15px;
        }
        h2 { color: #f8fafc; margin: 0; font-weight: 700; font-size: 24px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;}
        h2 span { background: linear-gradient(to right, #3b82f6, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { color: #94a3b8; font-size: 13px; margin-top: 4px; }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 16px;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        .message-row { display: flex; width: 100%; opacity: 0; transform: translateY(10px); animation: fadeIn 0.3s forwards ease-out; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }
        
        .bubble { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 15px; color: #f1f5f9; }
        .user .bubble { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); border-bottom-right-radius: 4px; box-shadow: 0 4px 14px rgba(37,99,235,0.25); }
        .ai .bubble { background: rgba(51, 65, 85, 0.5); border: 1px solid rgba(255,255,255,0.05); border-bottom-left-radius: 4px; }
        
        .sender-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; opacity: 0.6; }
        .user .sender-title { text-align: right; color: #93c5fd; }
        .ai .sender-title { color: #a5b4fc; }

        .bubble p { margin: 0 0 8px 0; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble img { max-width: 100%; border-radius: 12px; margin-top: 10px; display: block; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Input Controls */
        #file-status { color: #38bdf8; font-size: 13px; margin-bottom: 10px; display: none; padding-left: 5px; font-weight: 500; animation: fadeIn 0.2s; }
        .input-area { display: flex; gap: 12px; align-items: center; background: rgba(15, 23, 42, 0.4); padding: 6px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); }
        
        input[type="text"] { 
            flex: 1; padding: 12px; border: none; background: transparent; color: white; font-size: 15px; outline: none;
        }
        input[type="text"]::placeholder { color: #64748b; }
        
        .file-label {
            background: rgba(71, 85, 105, 0.4); color: #cbd5e1; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; font-size: 18px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05);
        }
        .file-label:hover { background: rgba(100, 116, 139, 0.6); color: white; transform: scale(1.05); }
        #image-input { display: none; }
        
        button { 
            height: 44px; padding: 0 24px; border: none; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border-radius: 12px; 
            cursor: pointer; font-weight: 600; font-size: 15px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(37,99,235,0.2);
        }
        button:hover { transform: scale(1.03); box-shadow: 0 6px 16px rgba(37,99,235,0.35); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header-area">
        <h2>⚡ <span>8B AI Assistant</span></h2>
        <div class="tagline">The official intelligent hub for Class 8B • Ultra-Fast Vision Edition</div>
    </div>
    
    <div id="chat-box"></div>
    <div id="file-status">📁 Image Selected</div>
    
    <div class="input-area">
        <label for="image-input" class="file-label">📎</label>
        <input type="file" id="image-input" accept="image/*" onchange="showFileStatus()">
        <input type="text" id="user-input" placeholder="Ask a study question or upload an image..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    
    function showFileStatus() {
        const fileInput = document.getElementById('image-input');
        const status = document.getElementById('file-status');
        if(fileInput.files.length > 0) {
            status.innerHTML = `✨ <strong>Ready to process:</strong> ${fileInput.files[0].name}`;
            status.style.display = "block";
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const fileInput = document.getElementById('image-input');
        const chatBox = document.getElementById('chat-box');
        const status = document.getElementById('file-status');
        
        const message = inputField.value.trim();
        const hasImage = fileInput.files.length > 0;
        
        if (!message && !hasImage) return;

        let userBubbleHtml = `<div class="message-row user"><div class="bubble"><div class="sender-title">You</div>${message}`;
        if (hasImage) {
            const imgUrl = URL.createObjectURL(fileInput.files[0]);
            userBubbleHtml += `<br><img src="${imgUrl}">`;
        }
        userBubbleHtml += `</div></div>`;
        chatBox.innerHTML += userBubbleHtml;
        
        inputField.value = '';
        status.style.display = "none";
        chatBox.scrollTop = chatBox.scrollHeight;

        const formData = new FormData();
        formData.append('message', message);
        if (hasImage) {
            formData.append('image', fileInput.files[0]);
        }
        fileInput.value = '';

        try {
            const response = await fetch('/ask', { method: 'POST', body: formData });
            const data = await response.json();
            const cleanAIResponse = marked.parse(data.response);
            
            chatBox.innerHTML += `
                <div class="message-row ai"><div class="bubble"><div class="sender-title">8B Assistant</div>${cleanAIResponse}</div></div>
            `;
        } catch (err) {
            chatBox.innerHTML += `
                <div class="message-row ai"><div class="bubble" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239,68,68,0.4);"><div class="sender-title">System Error</div>Failed processing vision text.</div></div>
            `;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
