<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 8B AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: #4158D0;
            background-image: linear-gradient(43deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 20px; 
            overflow: hidden; 
        }
        
        .app-window {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .new-chat-btn {
            background: #ffffff;
            color: #6366f1;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .new-chat-btn:hover {
            background: #6366f1;
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .session-item {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover, .session-item.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .delete-session-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-session-btn:hover { color: #ef4444; }

        .chat-container { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .chat-header { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 18px 24px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.15); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .chat-header h2 { 
            font-size: 1.3rem; 
            font-weight: 700; 
            color: #ffffff; 
        }
        
        .chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .message { 
            max-width: 80%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            line-height: 1.5; 
            font-size: 0.95rem; 
            animation: fadeIn 0.3s ease; 
            word-break: break-word; 
        }
        
        .user { 
            background: #6366f1; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        
        .bot { 
            background: rgba(255, 255, 255, 0.9); 
            color: #1e293b; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
        }
        
        .input-area { 
            padding: 18px 24px; 
            background: rgba(0, 0, 0, 0.15); 
            border-top: 1px solid rgba(255, 255, 255, 0.15); 
            display: flex; 
            gap: 12px; 
        }
        
        input[type="text"] { 
            flex: 1; 
            background: rgba(255, 255, 255, 0.9); 
            border: none; 
            border-radius: 12px; 
            padding: 14px; 
            color: #1e293b; 
            font-size: 0.95rem; 
            outline: none; 
        }
        
        button.send-btn { 
            background: #ffffff; 
            border: none; 
            color: #6366f1; 
            padding: 0 24px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
        }

        #imagePreviewContainer {
            display: none;
            padding: 8px 24px;
            background: rgba(0,0,0,0.3);
            font-size: 0.85rem;
            align-items: center;
            gap: 15px;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-window">
    <div class="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
        <div class="session-list" id="sessionList"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Class 8B Assistant ✨</h2>
        </div>
        <div class="chat-box" id="chatBox"></div>
        
        <div id="imagePreviewContainer">
            <span id="previewName" style="color: #FFCC70;"></span>
            <button onclick="clearImagePreview()" style="background:none; border:none; color:#ef4444; cursor:pointer; font-weight:bold;">✕ Remove</button>
        </div>

        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
            <button class="send-btn" onclick="document.getElementById('imageInput').click()" style="padding: 0 15px;">📷</button>
            
            <input type="text" id="userInput" placeholder="Ask your assistant anything..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sessionList = document.getElementById('sessionList');
    const imageInput = document.getElementById('imageInput');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
    const previewName = document.getElementById('previewName');

    let currentSessionId = '';
    let base64ImageString = '';

    window.onload = async () => {
        await loadSessions();
    };

    async function loadSessions() {
        try {
            const response = await fetch('/get_sessions');
            const sessions = await response.json();
            sessionList.innerHTML = '';
            
            if (sessions.length === 0) {
                await createNewChat();
                return;
            }

            sessions.forEach((session, index) => {
                const div = document.createElement('div');
                div.classList.add('session-item');
                div.id = `session-${session.id}`;
                if(session.id === currentSessionId) div.classList.add('active');
                
                div.innerHTML = `
                    <span onclick="switchSession('${session.id}')" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${session.title}</span>
                    <button class="delete-session-btn" onclick="deleteSession(event, '${session.id}')">✕</button>
                `;
                sessionList.appendChild(div);

                if (index === 0 && !currentSessionId) {
                    switchSession(session.id);
                }
            });
        } catch (e) {
            console.error("Error loading chat rooms:", e);
        }
    }

    async function createNewChat() {
        try {
            const response = await fetch('/create_session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: 'New Chat Room' })
            });
            const data = await response.json();
            currentSessionId = data.session_id;
            await loadSessions();
            switchSession(data.session_id);
        } catch (e) {
            console.error("Failed creating a new chat:", e);
        }
    }

    async function switchSession(sessionId) {
        currentSessionId = sessionId;
        document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`session-${sessionId}`);
        if (activeItem) activeItem.classList.add('active');

        chatBox.innerHTML = '';

        try {
            const response = await fetch(`/get_history/${sessionId}`);
            const history = await response.json();
            history.forEach(msg => {
                appendMessage(msg.text, msg.sender);
            });
            scrollToBottom();
        } catch (e) {
            console.error("Failed loading room data details:", e);
        }
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            previewName.innerText = `Selected: ${file.name}`;
            imagePreviewContainer.style.display = 'flex';

            const reader = new FileReader();
            reader.onload = function (e) {
                base64ImageString = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    }

    function clearImagePreview() {
        imageInput.value = "";
        base64ImageString = "";
        imagePreviewContainer.style.display = 'none';
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender === 'user' ? 'user' : 'bot');
        
        if (sender === 'bot' || sender === 'ai') {
            msgDiv.innerHTML = marked.parse(text);
        } else {
            msgDiv.innerText = text;
        }
        
        chatBox.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text && !base64ImageString) return;
        if (!currentSessionId) return;

        appendMessage(text ? text : "[Sent an image]", 'user');
        userInput.value = '';
        
        const imgToSend = base64ImageString;
        clearImagePreview();

        try {
            const response = await fetch(`/chat/${currentSessionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, image: imgToSend || null })
            });
            const data = await response.json();
            if (data.response) {
                appendMessage(data.response, 'bot');
                await loadSessions(); // Refresh list to catch dynamic first prompt title update!
            }
        } catch (error) {
            appendMessage("Error connecting to server backend system.", 'bot');
        }
    }

    async function deleteSession(event, sessionId) {
        event.stopPropagation();
        if (confirm("Delete this conversation room permanently?")) {
            await fetch(`/clear_session/${sessionId}`, { method: 'POST' });
            if (currentSessionId === sessionId) {
                currentSessionId = '';
            }
            await loadSessions();
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
