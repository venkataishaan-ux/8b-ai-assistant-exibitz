<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 8B AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .chat-container { width: 100%; max-width: 600px; height: 85vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .chat-header { background: rgba(255, 255, 255, 0.03); padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { font-size: 1.2rem; font-weight: 600; color: #a5b4fc; }
        .clear-btn { background: transparent; border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .clear-btn:hover { background: #ef4444; color: white; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; font-size: 0.95rem; animation: fadeIn 0.3s ease-in-out; }
        .user { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: rgba(255, 255, 255, 0.1); color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; background: rgba(0, 0, 0, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; gap: 10px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 12px; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: #6366f1; }
        button.send-btn { background: #4f46e5; border: none; color: white; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button.send-btn:hover { background: #4338ca; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>Class 8B Assistant ✨</h2>
        <button class="clear-btn" onclick="clearChat()">Clear History</button>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask your assistant anything..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // Automatically fetch old chat history when the page loads
    window.onload = async () => {
        const response = await fetch('/get_history');
        const history = await response.json();
        history.forEach(msg => {
            appendMessage(msg.text, msg.sender);
        });
        scrollToBottom();
    };

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            if (data.response) {
                appendMessage(data.response, 'bot');
            } else {
                appendMessage("Oops, something went wrong.", 'bot');
            }
        } catch (error) {
            appendMessage("Error connecting to server.", 'bot');
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function clearChat() {
        if (confirm("Are you sure you want to delete your chat history?")) {
            await fetch('/clear_history', { method: 'POST' });
            chatBox.innerHTML = '';
        }
    }
</script>

</body>
</html>
